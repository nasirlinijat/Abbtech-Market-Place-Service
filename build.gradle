plugins {
    id 'java'
    id 'application'
}

group = 'com.abbtech'
version = '1.0.0'

repositories {
    mavenCentral()
}

application {
    mainClass = 'com.abbtech.Main'
}

jar {
    manifest {
        attributes(
                'Main-Class': 'com.abbtech.Main'
        )
    }
}

tasks.register("buildJar"){
    print("Jar created")
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}