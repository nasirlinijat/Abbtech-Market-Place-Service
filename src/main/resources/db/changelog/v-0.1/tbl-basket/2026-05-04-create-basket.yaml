databaseChangeLog:
  - logicalFilePath: 2026-05-04-create-basket.yaml
  - changeSet:
      id: 1
      author: NijatNasirli
      comment: Create basket table to store user shopping cart items
      changes:
        - createTable:
            tableName: basket
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: item_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: count
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: created_date
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_date
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: ACTIVE

  - changeSet:
      id: 2
      author: NijatNasirli
      changes:
        - addForeignKeyConstraint:
            baseTableName: basket
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_basket_user
        - addForeignKeyConstraint:
            baseTableName: basket
            baseColumnNames: item_id
            referencedTableName: item
            referencedColumnNames: id
            constraintName: fk_basket_item
