databaseChangeLog:
  - logicalFilePath: 2026-04-25-create-item.yaml
  - changeSet:
      id: 1
      author: JavidanHatamov
      comment: Create item table to keep item information of e-market
      changes:
        - createTable:
            tableName: item
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: VARCHAR(250)
              - column:
                  name: image
                  type: VARCHAR(250)
              - column:
                  name: price
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: brand_id
                  type: BIGINT
              - column:
                  name: category_id
                  type: BIGINT
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 2
      author: JavidanHatamov
      changes:
        - addForeignKeyConstraint:
            baseTableName: item
            baseColumnNames: brand_id
            referencedTableName: brand
            referencedColumnNames: id
            constraintName: fk_brand_item

        - addForeignKeyConstraint:
            baseTableName: item
            baseColumnNames: category_id
            referencedTableName: category
            referencedColumnNames: id
            constraintName: fk_category_item