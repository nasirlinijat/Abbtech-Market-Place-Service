databaseChangeLog:
  - logicalFilePath: 2026-05-04-create-notification.yaml
  - changeSet:
      id: 1
      author: NijatNasirli
      comment: Create notification table
      changes:
        - createTable:
            tableName: notification
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: message
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: UNREAD

  - changeSet:
      id: 2
      author: NijatNasirli
      changes:
        - addForeignKeyConstraint:
            baseTableName: notification
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_notification_user
